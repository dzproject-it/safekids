services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: safekids-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: safekids
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-safekids_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d safekids"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (Node.js / Express) ─────────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: safekids-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: safekids
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-safekids_secret}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    # Port NON exposé — accessible uniquement via le proxy Nginx
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend (Vite build + Nginx) ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_STRIPE_PUBLIC_KEY: ${VITE_STRIPE_PUBLIC_KEY:-}
    container_name: safekids-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  pgdata:
