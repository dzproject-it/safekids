# ── Backend Deployment ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: safekids-backend
  namespace: safekids
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: safekids
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/part-of: safekids
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: safekids
    spec:
      containers:
        - name: backend
          image: safekids-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: safekids-backend-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: safekids-db-secret
                  key: POSTGRES_PASSWORD
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: safekids-stripe-secret
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: safekids-stripe-secret
                  key: STRIPE_WEBHOOK_SECRET
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: safekids-stripe-secret
                  key: ADMIN_TOKEN
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: safekids-backend
  namespace: safekids
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: safekids
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: safekids
  ports:
    - port: 3001
      targetPort: 3001
