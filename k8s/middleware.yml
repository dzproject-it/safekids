# ── Traefik Middleware : strip /api prefix pour le backend ─────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: safekids
spec:
  stripPrefix:
    prefixes:
      - /api
---
# ── Traefik Middleware : redirection HTTP → HTTPS ─────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: safekids
spec:
  redirectScheme:
    scheme: https
    permanent: true
