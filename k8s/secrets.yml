apiVersion: v1
kind: Secret
metadata:
  name: safekids-db-secret
  namespace: safekids
  labels:
    app.kubernetes.io/part-of: safekids
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_DB: safekids
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: safekids_secret
---
apiVersion: v1
kind: Secret
metadata:
  name: safekids-stripe-secret
  namespace: safekids
  labels:
    app.kubernetes.io/part-of: safekids
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
  STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
  ADMIN_TOKEN: "${ADMIN_TOKEN}"
